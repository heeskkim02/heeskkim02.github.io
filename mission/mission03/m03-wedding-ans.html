<!-- m02-wedding.html-->
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>웨딩 파티 초대장</title>
  </head>
  <body>
    <header>
      <h1>
        <img src="img/hero_text.png" alt="Welcome to Our Wedding Party">
      </h1>
      <nav>
        <ul>
          <li><a href="#">Message</a></li>
          <li><a href="#">Form</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section>
        <h2>초대장</h2>
        <p>
          신랑 누구누구와 신부 어느어느가<br>
          웨딩 파티를 개최하게 되었습니다.<br>
        </p>
        <p>
          바쁘시겠지만 부디 오셔서 축하해주시면 더 없이 기쁘겠습니다.<br>
          참석 여부를 알려주세요<br>
        </p>
       </section>
      </section>
      <section>
        <h2>참석 신청서</h2>
        <form action="" method="">
          <p>
            <label><input type="radio" name="attend" value="참석" checked="checked">참석</label>
            <label><input type="radio" name="attend" value="불참">불참</label>
        </p>
          이름: <input type="text" name="user_name"><br>
          이메일: <input type="email" name="user_mail"><br>
          <p>
            채식여부
            <select name="user_type">
              <option value="fruitarian">극단적 채식주의</option>
              <option value="vegan">비건</option>
              <option value="everything">관계없음</option>
            </select>
          </p>
          <p>
            알레르기가 있는 음식
            <label><input type="checkbox" name="allergy" value="달걀">달걀</label>
            <label><input type="checkbox" name="allergy" value="우유">우유</label>
            <label><input type="checkbox" name="allergy" value="밀">밀</label>
            <label><input type="checkbox" name="allergy" value="대두">대두</label>
          </p>
          메시지: <textarea name="message"></textarea><br>
          <input type="submit" value="전송">
          <input type="reset" value="취소"><br> 
        </form>
      </section>
    </main>
    <footer>
      <p><small>© 폼 화면 실습</small></p>
    </footer>
  </body>
</html>
