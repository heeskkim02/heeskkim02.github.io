<!DOCTYPE html>
<html>
<head>

    <title>미션 5주차</title>
    <style>
        * { margin: 0; padding: 0;}
        body { background-color: #bbf1ef;}
        h1 {
            font-size: 18px;
            border: 3px solid #ffffff;
            border-radius: 20px;
            padding: 6px 0;
            margin: 20px auto;
            width: 300px;
            text-align: center;
        }
        p, ul {
            text-align: center;
            margin-bottom: 20px;
        }
        img { 
            width: 20%; height: 20%; 
            border: 5px dashed #ff9a9c;
            border-radius: 30%;
            padding: 10px;
        }
        a { 
            background-color: #ff9a9c;
            display: block;
            padding: 20px 0;
            border-radius: 4px;
            color: #ffffff;
            border-top-left-radius: 20px;
            font-weight: bold;
            text-decoration: none;

        }
        ul {
            width: 100px;
            margin: 0 auto;
            list-style: none;
        }
        li { margin-bottom: 20px;}
    </style>
</head>
